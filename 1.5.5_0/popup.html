<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Rate Limit Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 320px;
            min-height: 120px;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            font-size: 14px;
            line-height: 1.4;
            padding: 16px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .username-link {
            color: #1da1f2;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        
        .username-link:hover {
            color: #4dabf7;
            text-decoration: underline;
        }
        
        .donate-section {
            margin-top: 8px;
            padding-top: 12px;
            border-top: 1px solid #333333;
        }
        
        .donate-text {
            color: #cccccc;
            font-size: 13px;
        }
        
        .subscribe-link {
            color: #ff6b6b;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        
        .subscribe-link:hover {
            color: #ff8e8e;
            text-decoration: underline;
        }
        
        .version {
            margin-top: 8px;
            color: #888888;
            font-size: 11px;
        }
        
        .icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            margin-right: 6px;
            vertical-align: text-top;
        }

        .info-section {
            margin-top: 12px;
            padding: 10px;
            background-color: #2a2a2a;
            border-radius: 6px;
            font-size: 11px;
            color: #b0b0b0;
            border: 1px solid #444;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m12 14 4-4"></path>
                <path d="M3.34 19a10 10 0 1 1 17.32 0"></path>
            </svg>
            Grok Rate Limit Display
        </div>
        
        <div>
            by <a href="https://x.com/blankspeaker" target="_blank" class="username-link">@blankspeaker</a>
        </div>
        
        <div class="donate-section">
            <div class="donate-text">
                Support development by <a href="https://x.com/blankspeaker/creator-subscriptions/subscribe" target="_blank" class="subscribe-link">Subscribing</a>
            </div>
        </div>
        
        <div class="info-section">
            All remaining values are calculated locally and may not be accurate if you use multiple devices/tabs etc.
            <br><br>
            You can reset the counter back to full by long pressing it for 2 seconds.
        </div>
        
        <div class="version">
            Version 1.5
        </div>
    </div>
</body>
</html>
