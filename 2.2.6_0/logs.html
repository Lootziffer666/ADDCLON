<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>System Logs - Grok Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        h1 {
            font-size: 24px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .log-count {
            font-size: 14px;
            color: #888;
            font-weight: normal;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .controls input[type="text"] {
            padding: 8px 12px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #252542;
            color: #fff;
            width: 200px;
        }

        .controls input[type="text"]::placeholder {
            color: #666;
        }

        .controls select {
            padding: 8px 12px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #252542;
            color: #fff;
            cursor: pointer;
        }

        .controls button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4a90d9;
            color: white;
        }

        .btn-primary:hover {
            background: #3a7bc8;
        }

        .btn-danger {
            background: #d94a4a;
            color: white;
        }

        .btn-danger:hover {
            background: #c83a3a;
        }

        .btn-secondary {
            background: #444;
            color: white;
        }

        .btn-secondary:hover {
            background: #555;
        }

        .log-container {
            background: #0d0d1a;
            border-radius: 8px;
            border: 1px solid #333;
            overflow: hidden;
        }

        .log-header {
            display: grid;
            grid-template-columns: 180px 70px 1fr;
            padding: 12px 16px;
            background: #252542;
            font-weight: 600;
            font-size: 13px;
            color: #aaa;
            border-bottom: 1px solid #333;
        }

        .log-list {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
        }

        .log-entry {
            display: grid;
            grid-template-columns: 180px 70px 1fr;
            padding: 10px 16px;
            border-bottom: 1px solid #222;
            font-size: 13px;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
        }

        .log-entry:hover {
            background: #1a1a30;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-timestamp {
            color: #888;
        }

        .log-level {
            font-weight: 600;
            text-transform: uppercase;
        }

        .log-level.INFO {
            color: #4a90d9;
        }

        .log-level.OK {
            color: #4ad94a;
        }

        .log-level.FAIL {
            color: #d94a4a;
        }

        .log-level.WARN {
            color: #d9a64a;
        }

        .log-message {
            color: #e0e0e0;
            word-break: break-word;
        }

        .log-details {
            color: #888;
            margin-left: 5px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .auto-scroll-notice {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #252542;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 12px;
            color: #888;
            border: 1px solid #444;
        }

        .auto-scroll-notice.active {
            color: #4ad94a;
            border-color: #4ad94a;
        }

        /* Scrollbar styling */
        .log-list::-webkit-scrollbar {
            width: 8px;
        }

        .log-list::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        .log-list::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .log-list::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <span>System Logs</span>
                <span class="log-count" id="logCount">(0 entries)</span>
            </h1>
            <div class="controls">
                <input type="text" id="searchInput" placeholder="Search logs...">
                <select id="levelFilter">
                    <option value="">All Levels</option>
                    <option value="INFO">INFO</option>
                    <option value="OK">OK</option>
                    <option value="WARN">WARN</option>
                    <option value="FAIL">FAIL</option>
                </select>
                <button class="btn-secondary" id="refreshBtn">Refresh</button>
                <button class="btn-primary" id="exportBtn">Export .txt</button>
                <button class="btn-danger" id="clearBtn">Clear All</button>
            </div>
        </header>

        <div class="log-container">
            <div class="log-header">
                <span>Timestamp</span>
                <span>Level</span>
                <span>Message</span>
            </div>
            <div class="log-list" id="logList">
                <div class="empty-state" id="emptyState">
                    <div class="icon">📋</div>
                    <p>No logs yet</p>
                </div>
            </div>
        </div>
    </div>

    <div class="auto-scroll-notice" id="autoScrollNotice">
        Auto-scroll: OFF
    </div>

    <script src="src/logger.js"></script>
    <script src="logs.js"></script>
</body>
</html>
