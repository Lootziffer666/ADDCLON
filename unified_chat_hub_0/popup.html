<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatHub Sidebar</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 12px; width: 290px; }
      h1 { font-size: 16px; margin: 0 0 10px; }
      p { margin: 6px 0; font-size: 13px; }
      button { width: 100%; padding: 8px; margin-top: 8px; }
      .muted { color: #666; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>ChatHub Sidebar</h1>
    <p>Öffne ChatGPT oder Gemini und nutze die Sidebar direkt im Chat.</p>
    <button id="toggle">Sidebar umschalten</button>
    <button id="options">Einstellungen öffnen</button>
    <p class="muted">Hotkey: Strg+Shift+Y</p>
    <script src="popup.js"></script>
  </body>
</html>
